name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run backend tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

  frontend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/skillsindex?sslmode=disable
      SESSION_SECRET: ci-session-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: skillsindex
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skillsindex"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: frontend-next

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Run frontend account menu regression tests
        run: npm run test:unit:account-menu

      - name: Run frontend build
        run: npm run build

      - name: Run frontend end-to-end tests
        run: npm run test:e2e

      - name: Bootstrap backend state for real-backend smoke test
        working-directory: backend
        run: go run ./cmd/bootstrap

      - name: Run frontend real-backend smoke test
        working-directory: .
        run: ./scripts/run_frontend_real_backend_smoke.sh

      - name: Run repository max-lines check
        working-directory: .
        run: ./scripts/check_max_lines.sh
