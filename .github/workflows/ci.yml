name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run backend tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-next

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Run frontend build
        run: npm run build

      - name: Run frontend end-to-end tests
        run: npm run test:e2e

      - name: Run repository max-lines check
        working-directory: .
        run: ./scripts/check_max_lines.sh
